name: Release

# Publishes learnmax to npm so it becomes installable as a pi package:
#   pi install npm:@xaccefy/learnmax
# (git install already works without CI: pi install git:x4cc3/learnmax)
#
# Trigger: publish a GitHub Release. Tag the release vX.Y.Z; the version is
# synced into package.json automatically.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate skills
        run: |
          for d in skills/*/; do
            [ -f "$d/SKILL.md" ] || { echo "Missing SKILL.md in $d"; exit 1; }
          done
          echo "All skills valid"

      - name: Smoke-test artifact validator
        run: |
          set -e
          WS=$(mktemp -d)
          mkdir -p "$WS/lessons" "$WS/review"
          cat > "$WS/MISSION.md" <<'EOF'
# Mission: sample
## Why
demo.
## Success looks like
- demo.
## Constraints
- none.
EOF
          cat > "$WS/GLOSSARY.md" <<'EOF'
# Sample Glossary
## Terms
**Term** (defined in [[lessons/0001-example.md]]):
A thing. _Avoid_: alias.
EOF
          cat > "$WS/lessons/0001-example.md" <<'EOF'
# 0001 - Example
**Mission tie-in:** demo.

## The idea
It is a thing.

## Mental model
Like a box.

## How it works
Internals here.

## Worked example
```c
int x = 1;
```

## Pitfalls
- Trap one.

## Why it matters
Because.

## Summary
Short restate.

## Retrieval practice
Q: What is it?
A: A thing.

## References
- Source.
EOF
          cat > "$WS/review/2024-01-01.md" <<'EOF'
# Review: 2024-01-01
## Results
- Term: known
## Weak Items
- Term (from GLOSSARY.md)
EOF
          ( cd "$WS" && node "$PWD/scripts/validate-artifacts.mjs" )
          echo "Validator passes on a valid workspace"

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing @xaccefy/learnmax@$VERSION"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify installable
        run: npm view @xaccefy/learnmax version
